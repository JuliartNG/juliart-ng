<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Juliart NG — Curator Access</title>
  <link rel="icon" type="image/png" href="/static/images/logo.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cream:      #FDFBF7;
      --brown:      #3E2723;
      --brown-mid:  #5D4037;
      --brown-lite: #8D6E63;
      --gold:       #C9A96E;
      --gold-lite:  #E8D5B0;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--brown);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', sans-serif;
      padding: 24px;
      /* subtle texture */
      background-image: radial-gradient(ellipse at 20% 50%, rgba(201,169,110,0.07) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, rgba(201,169,110,0.05) 0%, transparent 50%);
      animation: fadeIn 0.8s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--cream);
      border-radius: 16px;
      padding: 52px 40px 44px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,0.45);
    }

    .logo-wrap {
      margin: 0 auto 28px;
      width: 80px;
      height: 80px;
    }
    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      color: var(--brown);
      margin-bottom: 6px;
    }
    .card-sub {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--brown-lite);
      margin-bottom: 36px;
    }

    .error-box {
      background: #fff0f0;
      border: 1px solid #ffcdd2;
      border-radius: 6px;
      padding: 11px 16px;
      font-size: 12px;
      color: #c62828;
      margin-bottom: 18px;
      text-align: left;
    }

    .pwd-input {
      width: 100%;
      padding: 15px 18px;
      border: 1.5px solid var(--gold-lite);
      border-radius: 6px;
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      color: var(--brown);
      background: var(--cream);
      text-align: center;
      letter-spacing: 4px;
      outline: none;
      margin-bottom: 16px;
      transition: border 0.3s;
    }
    .pwd-input::placeholder { letter-spacing: 1px; color: var(--brown-lite); font-size: 13px; }
    .pwd-input:focus { border-color: var(--gold); }

    .enter-btn {
      width: 100%;
      padding: 16px;
      background: var(--brown);
      color: var(--cream);
      border: none;
      border-radius: 6px;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
      margin-bottom: 28px;
    }
    .enter-btn:hover  { background: var(--brown-mid); }
    .enter-btn:active { transform: scale(0.98); }

    .ornament {
      font-size: 14px;
      color: var(--gold);
      letter-spacing: 8px;
      margin-bottom: 20px;
    }

    .back-link {
      font-size: 11px;
      color: var(--brown-lite);
      text-decoration: none;
      letter-spacing: 1px;
      transition: color 0.3s;
    }
    .back-link:hover { color: var(--brown); }

    /* password toggle eye */
    .pwd-wrap { position: relative; }
    .pwd-eye {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-60%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 17px;
      color: var(--brown-lite);
      padding: 0;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="logo-wrap">
      <img src="/static/images/logo.png" alt="Juliart NG"/>
    </div>

    <h1 class="card-title">Curator Access</h1>
    <p class="card-sub">Juliart NG &nbsp;·&nbsp; Private Entrance</p>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/showglass">
      <div class="pwd-wrap">
        <input class="pwd-input" type="password" name="password"
               id="pwdField" placeholder="Enter passphrase" autofocus
               autocomplete="current-password"/>
        <button type="button" class="pwd-eye" onclick="togglePwd()">👁</button>
      </div>
      <button class="enter-btn" type="submit">Enter</button>
    </form>

    <div class="ornament">✦ &nbsp; ✦ &nbsp; ✦</div>
    <a href="/" class="back-link">← Back to store</a>

  </div>

  <script>
    function togglePwd() {
      const f = document.getElementById('pwdField');
      f.type = f.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
